name: "功能建议 | Feature Request"
description: 提出一个新功能或改进建议
title: "[Feature] "
labels: ["feature", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > 感谢提出建议！提交前请先 [搜索现有 Issue](https://gitcode.com/openharmony-sig/deveco-code/issues)，避免重复提交。
        > 请详细描述你的需求，以便我们理解你的想法。

  - type: textarea
    id: feature-description
    attributes:
      label: 功能描述
      description: 你希望新增或改进什么功能？它能解决什么问题？
      placeholder: 描述你期望的功能及其带来的价值
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 使用场景 / 解决的问题
      description: 你在什么场景下需要这个功能？它解决了你当前遇到的什么痛点？
      placeholder: 描述实际使用场景与当前遇到的困难
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你是否考虑过其他实现方式？（可选）
      placeholder: 描述你考虑过的替代方案
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息
      description: 任何有助于理解该建议的补充信息（可选）
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查清单
      description: 请在提交 Issue 前确认以下事项
      options:
        - label: 我使用了正确的 Issue 模板
          required: true
        - label: 我提供了清晰的描述和必要的细节
          required: true
        - label: 标题清晰且包含类型前缀
          required: true
