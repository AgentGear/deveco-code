name: "问题咨询 | Question"
description: 提出使用上的疑问或咨询
title: "[Question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > 欢迎提问！提交前请先 [搜索现有 Issue](https://gitcode.com/openharmony-sig/deveco-code/issues)，避免重复提交。
        > 请尽量描述清楚你的问题，附上版本信息有助于我们更快回复。

  - type: textarea
    id: question
    attributes:
      label: 你的问题
      description: 你想咨询什么？
      placeholder: 详细描述你的问题
    validations:
      required: true

  - type: input
    id: deveco-version
    attributes:
      label: DevEco Code 版本
      description: 你使用的 DevEco Code 版本是多少？
      placeholder: 例如 0.0.1
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你使用的操作系统是什么？
      placeholder: 例如 macOS 26.0.1、Ubuntu 22.04、Windows 11
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查清单
      description: 请在提交 Issue 前确认以下事项
      options:
        - label: 我使用了正确的 Issue 模板
          required: true
        - label: 我提供了清晰的描述和必要的细节
          required: true
        - label: 标题清晰且包含类型前缀
          required: true
