name: "代码重构 | Refactor"
description: 提出代码重构建议
title: "[Refactor] "
labels: ["refactor", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > 感谢关注社区！提交前请先 [搜索现有 Issue](https://gitcode.com/openharmony-sig/deveco-code/issues)，避免重复提交。
        > 请描述清楚重构的背景与动机，以便我们评估。

  - type: textarea
    id: refactor-description
    attributes:
      label: 代码重构描述
      description: 请描述需要代码重构的背景与动机
      placeholder: |
        【重构原因】请描述需要重构的原因，例如提升性能、改善代码结构、增加可维护性等。
    validations:
      required: true

  - type: textarea
    id: refactor-content
    attributes:
      label: 代码重构涉及内容与验证
      description: 请提供涉及的模块与测试计划
      placeholder: |
        【涉及模块】列出受影响的文件或模块。
        【验证计划】描述你计划如何验证重构的效果，例如通过单元测试、性能测试等。
        【预期效果】描述重构后预期达到的效果，例如性能提升、代码可读性增强等。
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: DevEco Code 版本
      description: 请提供你使用的 DevEco Code 版本信息
      placeholder: "0.0.1"
    validations:
      required: true

  - type: textarea
    id: other-info
    attributes:
      label: 其他信息
      description: 如果你有其他具体的重构建议或想法，可以在这里描述（可选）
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查清单
      description: 请在提交 Issue 前确认以下事项
      options:
        - label: 我使用了正确的 Issue 模板
          required: true
        - label: 我提供了清晰的描述和必要的细节
          required: true
        - label: 标题清晰且包含类型前缀
          required: true
