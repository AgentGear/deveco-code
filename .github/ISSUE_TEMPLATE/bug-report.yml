name: "Bug 反馈 | Bug Report"
description: 反馈一个需要修复的问题
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        > [!IMPORTANT]
        > 感谢反馈问题！提交前请先 [搜索现有 Issue](https://gitcode.com/openharmony-sig/deveco-code/issues)，避免重复提交。
        > 请尽量完整填写以下信息，以便我们快速定位和修复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要描述你遇到的问题
      placeholder: 发生了什么？
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: 预期行为
      description: 你认为正确的行为应该是什么？
      placeholder: 描述你期望看到的结果
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: 实际行为
      description: 实际发生了什么？
      placeholder: 描述你实际观察到的现象
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 我们如何才能复现这个问题？
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: error-log
    attributes:
      label: 错误日志 / 堆栈信息
      description: 粘贴相关的报错信息、日志或堆栈（如没有报错输出可留空）
      placeholder: 在此粘贴错误输出
      render: shell
    validations:
      required: false

  - type: input
    id: deveco-version
    attributes:
      label: DevEco Code 版本
      description: 你使用的 DevEco Code 版本是多少？
      placeholder: 例如 0.0.1（可在「关于 / About」中查看）
    validations:
      required: true

  - type: input
    id: plugins
    attributes:
      label: 插件
      description: 你启用了哪些插件？（可选）
      placeholder: 例如 hvigor、hdc、arkts
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: 操作系统
      description: 你使用的操作系统是什么？
      placeholder: 例如 macOS 26.0.1、Ubuntu 22.04、Windows 11
    validations:
      required: true

  - type: input
    id: terminal
    attributes:
      label: 终端
      description: 你使用的终端是什么？
      placeholder: 例如 iTerm2、Ghostty、Alacritty、Windows Terminal
    validations:
      required: true

  - type: textarea
    id: screenshot-or-link
    attributes:
      label: 截图 / 分享链接
      description: 运行 `/share` 获取分享链接，或拖拽上传截图（可选）
      placeholder: 粘贴链接或拖拽截图到此
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前检查清单
      description: 请在提交 Issue 前确认以下事项
      options:
        - label: 我使用了正确的 Issue 模板
          required: true
        - label: 我提供了清晰的描述和必要的细节
          required: true
        - label: 我已提供 DevEco Code 版本与系统环境信息
          required: true
        - label: 标题清晰且包含类型前缀
          required: true
